<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위플레이 주차별 분석 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --text: #e8eaf2;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --accent1: #5b8def;
    --accent2: #4ecdc4;
    --accent3: #f7b731;
    --accent4: #ff6b6b;
    --accent5: #a29bfe;
    --accent1-soft: rgba(91,141,239,0.12);
    --accent2-soft: rgba(78,205,196,0.12);
    --accent3-soft: rgba(247,183,49,0.12);
    --accent4-soft: rgba(255,107,107,0.12);
    --accent5-soft: rgba(162,155,254,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8eaf2 0%, #7a8099 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-left p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
    font-weight: 400;
  }
  .date-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
  }
  .toggle-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: var(--accent1);
    border-color: var(--accent1);
    color: #fff;
    font-weight: 600;
  }

  /* Groups */
  .groups-wrap {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .group-num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }
  .group-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .group-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* 2-col grid */
  .group-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .group-body .left-panel {
    padding: 24px;
    border-right: 1px solid var(--border);
  }
  .group-body .right-panel {
    padding: 24px;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* Stat rows */
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    margin-bottom: 8px;
    gap: 8px;
  }
  .stat-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    flex: 1;
  }
  .stat-val-group {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .stat-val {
    font-size: 17px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: -0.5px;
  }
  .stat-pct {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .stat-delta {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
  }
  .delta-up { color: #4ecdc4; background: rgba(78,205,196,0.12); }
  .delta-dn { color: #ff6b6b; background: rgba(255,107,107,0.12); }

  /* Bar within stat */
  .mini-bar-wrap {
    width: 64px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    align-self: flex-end;
  }
  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* Chart wrapper */
  .chart-wrap {
    position: relative;
    height: 220px;
  }

  /* Multi-metric left */
  .metrics-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Color accents per group */
  .g1 .group-num { background: var(--accent1-soft); color: var(--accent1); }
  .g1 .group-header { border-bottom-color: var(--border); }
  .g1 .stat-val { color: var(--accent1); }
  .g1 .mini-bar-fill { background: var(--accent1); }

  .g2 .group-num { background: var(--accent2-soft); color: var(--accent2); }
  .g2 .stat-val { color: var(--accent2); }
  .g2 .mini-bar-fill { background: var(--accent2); }

  .g3 .group-num { background: var(--accent3-soft); color: var(--accent3); }
  .g3 .stat-val { color: var(--accent3); }
  .g3 .mini-bar-fill { background: var(--accent3); }

  .g4 .group-num { background: var(--accent5-soft); color: var(--accent5); }
  .g4 .stat-val { color: var(--accent5); }
  .g4 .mini-bar-fill { background: var(--accent5); }

  /* Chart canvas */
  canvas { display: block; }

  /* Divider between multi rows */
  .metric-section {
    margin-bottom: 12px;
  }
  .metric-section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  @media (max-width: 900px) {
    .group-body { grid-template-columns: 1fr; }
    .group-body .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>위플레이 주차별 분석</h1>
    <p>App 방문 → 위플레이 → 행동 전환 퍼널 분석 대시보드</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <span class="date-badge">기준: 2026.04.26 – 05.02</span>
    <div class="toggle-wrap" id="toggleWrap">
      <button class="toggle-btn active" onclick="setMode('both')">수치+비율</button>
      <button class="toggle-btn" onclick="setMode('val')">수치만</button>
      <button class="toggle-btn" onclick="setMode('pct')">비율만</button>
    </div>
  </div>
</div>

<div class="groups-wrap" id="groupsWrap">
  <!-- rendered by JS -->
</div>

<script>
const WEEKS = ['3.29-4.4','4.05-4.11','4.12-4.18','4.19-4.25','4.26-5.2'];
const W_SHORT = ['W1','W2','W3','W4','W5'];

const RAW = {
  g1: {
    title: 'App 방문자 중 위플레이 방문자',
    metrics: [
      { name: 'App 방문자수', vals: [575810,598982,607362,607425,595231], color: '#5b8def' },
      { name: '위플레이 방문자수', vals: [16116,35925,42355,47057,50543], color: '#4ecdc4' },
    ],
    ratioOf: [1, 0] // index1 / index0
  },
  g2: {
    title: '위플레이 랜딩 비율',
    metrics: [
      { name: '소개 페이지', vals: [7917,6392,3212,2297,1870], color: '#f7b731' },
      { name: '그룹 페이지', vals: [10122,30769,39570,45067,48929], color: '#4ecdc4' },
    ],
    ratioOf: null
  },
  g3: {
    title: '소개 페이지 행동 비율',
    metrics: [
      { name: '그룹 만들기', vals: [4514,3266,1610,1107,896], color: '#f7b731' },
      { name: '그룹 참여하기', vals: [3222,2726,1515,1059,821], color: '#ffb8b8' },
    ],
    ratioOf: null
  },
  g4: {
    title: '그룹 페이지 행동 비율',
    metrics: [
      { name: '그룹설정',   vals: [2468,2910,1870,1443,1180], color: '#a29bfe' },
      { name: '멤버초대하기',vals: [0,674,1215,1181,1232], color: '#fd79a8' },
      { name: '게시판',     vals: [954,2079,2115,1560,1155], color: '#55efc4' },
      { name: '응원하기',   vals: [4502,8116,7651,7201,6381], color: '#f7b731' },
      { name: '포인트선물', vals: [1907,2672,2519,1963,1807], color: '#74b9ff' },
      { name: '출석체크',   vals: [6919,25381,35452,41826,46192], color: '#e17055' },
    ],
    ratioOf: null
  }
};

const GROUP_COLORS = ['#5b8def','#4ecdc4','#f7b731','#a29bfe'];
const GROUP_CLASSES = ['g1','g2','g3','g4'];
const GROUP_LABELS = ['1','2','3','4'];

let displayMode = 'both';

function setMode(m) {
  displayMode = m;
  document.querySelectorAll('.toggle-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['both','val','pct'][i] === m);
  });
  renderAll();
}

function fmt(n) {
  return n.toLocaleString('ko-KR');
}

function pctOf(a, b) {
  if (!b) return '—';
  return (a/b*100).toFixed(1)+'%';
}

function delta(curr, prev) {
  if (!prev) return null;
  const d = ((curr-prev)/prev*100);
  return { sign: d>=0?'+':'-', val: Math.abs(d).toFixed(1), up: d>=0 };
}

function renderAll() {
  const wrap = document.getElementById('groupsWrap');
  wrap.innerHTML = '';
  ['g1','g2','g3','g4'].forEach((gk,gi) => {
    const G = RAW[gk];
    const card = document.createElement('div');
    card.className = `group-card ${GROUP_CLASSES[gi]}`;

    // header
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <div class="group-num">${GROUP_LABELS[gi]}</div>
      <div class="group-title">${G.title}</div>
      <div class="group-subtitle">${WEEKS[WEEKS.length-1]} 기준 최신 5주</div>
    `;
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'group-body';

    // LEFT: latest week stats
    const left = document.createElement('div');
    left.className = 'left-panel';
    left.innerHTML = `<div class="panel-label">최근 1주 현황 (${WEEKS[4]})</div>`;

    const total = G.metrics.reduce((s,m)=>s+m.vals[4],0);

    G.metrics.forEach(m => {
      const v = m.vals[4];
      const vPrev = m.vals[3];
      const d = delta(v, vPrev);
      const ratio = G.ratioOf !== null
        ? pctOf(G.metrics[G.ratioOf[0]].vals[4], G.metrics[G.ratioOf[1]].vals[4]) // special
        : pctOf(v, total);
      const barPct = Math.round((v/Math.max(...G.metrics.map(x=>x.vals[4])))*100);

      let html = `<div class="stat-row">
        <div class="stat-name">${m.name}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">`;

      if (displayMode !== 'pct') {
        html += `<div class="stat-val" style="color:${m.color}">${fmt(v)}</div>`;
      }
      if (displayMode !== 'val') {
        if (G.ratioOf && m === G.metrics[1]) {
          const r = pctOf(G.metrics[1].vals[4], G.metrics[0].vals[4]);
          html += `<span class="stat-pct" style="color:${m.color};background:${m.color}22">${r} (앱 대비)</span>`;
        } else {
          html += `<span class="stat-pct">${ratio} of total</span>`;
        }
      }
      if (d) {
        html += `<span class="stat-delta ${d.up?'delta-up':'delta-dn'}">${d.up?'▲':'▼'}${d.val}%</span>`;
      }
      html += `<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${barPct}%;background:${m.color}"></div></div>`;
      html += `</div></div>`;
      left.innerHTML += html;
    });

    // special summary for g1
    if (gk === 'g1') {
      const app = RAW.g1.metrics[0].vals[4];
      const wp = RAW.g1.metrics[1].vals[4];
      left.innerHTML += `<div style="margin-top:12px;padding:10px 12px;border-radius:8px;background:rgba(91,141,239,0.1);border:1px solid rgba(91,141,239,0.25)">
        <div style="font-size:11px;color:#7a8099;margin-bottom:4px">위플레이 전환율</div>
        <div style="font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:#5b8def">${pctOf(wp,app)}</div>
        <div style="font-size:11px;color:#7a8099;margin-top:2px">App 방문자 기준</div>
      </div>`;
    }

    body.appendChild(left);

    // RIGHT: trend chart
    const right = document.createElement('div');
    right.className = 'right-panel';
    right.innerHTML = `<div class="panel-label">추이 (5주)</div>`;

    const chartWrap = document.createElement('div');
    chartWrap.className = 'chart-wrap';
    const canvas = document.createElement('canvas');
    canvas.id = `chart_${gk}`;
    chartWrap.appendChild(canvas);
    right.appendChild(chartWrap);

    // mode toggle label
    if (displayMode !== 'val') {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:10px;color:#4a5068;margin-top:8px;text-align:right';
      note.textContent = '수치 기준 추이 (비율은 좌측 패널 참조)';
      right.appendChild(note);
    }

    body.appendChild(right);
    card.appendChild(body);
    wrap.appendChild(card);

    // Draw chart
    setTimeout(() => {
      const ctx = canvas.getContext('2d');
      const datasets = G.metrics.map(m => ({
        label: m.name,
        data: m.vals,
        borderColor: m.color,
        backgroundColor: m.color + '22',
        fill: gk === 'g1' ? false : true,
        tension: 0.4,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: m.color,
        borderWidth: 2.5,
      }));

      new Chart(ctx, {
        type: 'line',
        data: { labels: W_SHORT, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'top',
              labels: {
                color: '#7a8099',
                font: { size: 11, family: 'Noto Sans KR' },
                boxWidth: 10,
                boxHeight: 10,
                padding: 10,
              }
            },
            tooltip: {
              backgroundColor: '#1e2230',
              borderColor: '#2a2f3d',
              borderWidth: 1,
              titleColor: '#e8eaf2',
              bodyColor: '#a0a8c0',
              padding: 10,
              titleFont: { size: 12, family: 'Noto Sans KR', weight: '600' },
              callbacks: {
                label: (ctx) => {
                  const v = ctx.raw;
                  const total2 = G.metrics.reduce((s,m)=>s+m.vals[ctx.dataIndex],0);
                  const pct = pctOf(v, total2);
                  return ` ${ctx.dataset.label}: ${fmt(v)}  (${pct})`;
                }
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#1e2230' },
              ticks: { color: '#4a5068', font: { size: 10, family: 'IBM Plex Mono' } },
            },
            y: {
              grid: { color: '#1e2230' },
              ticks: {
                color: '#4a5068',
                font: { size: 10, family: 'IBM Plex Mono' },
                callback: v => v >= 1000 ? (v/1000).toFixed(0)+'K' : v
              }
            }
          }
        }
      });
    }, 50);
  });
}

renderAll();
</script>
</body>
</html>
