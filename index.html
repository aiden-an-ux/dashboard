<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주차별 전환율 대시보드 | Kyobo Lifeplanet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:   #0d1117; --bg2: #161b22; --bg3: #1c2128;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --t1: #e6edf3; --t2: #8b949e; --t3: #555f6a;
  --green: #1D9E75; --greenl: #5DCAA5;
  --blue:  #378ADD; --bluel:  #85B7EB;
  --orange:#D85A30; --orangel:#F0997B;
  --accent:#00B85D;
}
body { font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--t1); font-size:13px; line-height:1.5; }
.hdr { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 28px; height:54px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
.hdr-l { display:flex; align-items:center; gap:10px; }
.logo { width:26px; height:26px; border-radius:6px; background:linear-gradient(135deg,var(--accent),#007a3d); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
.hdr-title { font-size:14px; font-weight:600; }
.hdr-sub { font-size:11px; color:var(--t3); margin-left:6px; }
.badge { font-size:11px; padding:2px 9px; border-radius:20px; background:rgba(0,184,93,.12); color:var(--accent); border:1px solid rgba(0,184,93,.25); }
.main { padding:22px 28px 40px; max-width:1400px; margin:0 auto; }
.section { margin-bottom:30px; }
.sec-hdr { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
.sec-num { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:.08em; }
.sec-title { font-size:14px; font-weight:600; color:var(--t1); }
.sec-desc { font-size:11px; color:var(--t3); margin-top:2px; }
.divider { height:1px; background:var(--border); margin-bottom:24px; }
.kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:9px; margin-bottom:22px; }
.kpi { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:13px 15px; }
.kpi-lbl { font-size:10px; color:var(--t3); margin-bottom:5px; }
.kpi-val { font-size:20px; font-weight:600; line-height:1.1; }
.kpi-sub { font-size:10px; color:var(--t3); margin-top:3px; }
.kv-g { color:var(--greenl); } .kv-b { color:var(--bluel); } .kv-o { color:var(--orangel); } .kv-w { color:var(--t1); }
.sum-week { font-size:11px; color:var(--t3); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.sum-week strong { color:var(--t2); font-weight:500; }
.sum-week .vs { font-size:10px; padding:1px 7px; background:rgba(255,255,255,0.05); border-radius:10px; color:var(--t3); }
.sum-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:10px; }
.sum-ch { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.sum-ch-hdr { padding:10px 14px 8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:7px; }
.sum-ch-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sum-ch-name { font-size:11px; font-weight:600; color:var(--t1); }
.sum-ch-sub  { font-size:10px; color:var(--t3); margin-left:auto; }
.sum-ch-contract { margin-left:auto; display:flex; align-items:center; gap:5px; }
.sum-ch-contract-val { font-size:13px; font-weight:600; color:var(--t1); }
.sum-ch-contract-chg { font-size:10px; font-weight:500; padding:1px 5px; border-radius:10px; }
.sum-ch-contract-chg.up { background:rgba(29,158,117,0.15); color:#5DCAA5; }
.sum-ch-contract-chg.dn { background:rgba(216,90,48,0.15); color:#F0997B; }
.sum-ch-contract-chg.flat { background:rgba(128,128,128,0.12); color:var(--t3); }
.pie-section { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:10px; }
.pie-section-title { font-size:11px; font-weight:600; color:var(--t1); margin-bottom:12px; }
.pie-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.pie-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
.pie-label { font-size:11px; font-weight:500; color:var(--t2); }
.pie-legend { display:flex; flex-direction:column; gap:4px; width:100%; }
.pie-legend-row { display:flex; align-items:center; justify-content:space-between; gap:6px; font-size:10px; color:var(--t2); }
.pie-legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.pie-legend-pct { font-weight:500; color:var(--t1); font-size:10px; }
.pie-wrap { position:relative; width:100%; }
.vis-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.vis-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.vis-card-title { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:.05em; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.vis-card-title::before { content:''; display:inline-block; width:3px; height:11px; border-radius:2px; background:var(--accent); flex-shrink:0; }
.vis-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:0.5px solid var(--border); }
.vis-row:last-child { border-bottom:none; }
.vis-row-left { display:flex; align-items:center; gap:7px; }
.vis-row-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.vis-row-lbl { font-size:11px; color:var(--t2); }
.vis-row-tag { font-size:9px; padding:1px 6px; border-radius:8px; font-weight:500; }
.vis-row-right { display:flex; align-items:center; gap:10px; text-align:right; }
.vis-row-val { font-size:12px; font-weight:600; color:var(--t1); }
.vis-row-pct { font-size:10px; color:var(--t3); min-width:44px; }
.vis-total-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border2); }
.vis-total-lbl { font-size:11px; color:var(--t2); }
.vis-total-val { font-size:18px; font-weight:600; color:var(--t1); }
.vis-total-sub { font-size:10px; color:var(--t3); }
.vis-section-lbl { font-size:10px; font-weight:500; color:var(--t3); letter-spacing:.06em; margin:8px 0 4px; }
.sum-rows { padding:8px 0; }
.sum-row { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:8px; padding:5px 14px; }
.sum-row:hover { background:rgba(255,255,255,0.03); }
.sum-row-lbl { font-size:11px; color:var(--t2); }
.sum-row-val { font-size:12px; font-weight:600; color:var(--t1); text-align:right; min-width:60px; }
.sum-row-chg { font-size:10px; font-weight:500; text-align:right; min-width:52px; }
.up   { color:#5DCAA5; } .dn   { color:#F0997B; } .flat { color:var(--t3); }
.up::before { content:'▲ '; font-size:8px; } .dn::before { content:'▼ '; font-size:8px; } .flat::before { content:'— '; font-size:8px; }
.sum-funnel { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; grid-column:1/-1; }
.sum-funnel-title { font-size:11px; font-weight:600; color:var(--t1); margin-bottom:10px; }
.funnel-kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.fkpi { background:var(--bg3); border-radius:8px; padding:10px 12px; }
.fkpi-lbl { font-size:10px; color:var(--t3); margin-bottom:4px; }
.fkpi-val { font-size:18px; font-weight:600; }
.fkpi-chg { font-size:10px; font-weight:500; margin-top:3px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
.card-title { font-size:11px; font-weight:500; color:var(--t2); margin-bottom:12px; letter-spacing:.03em; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.col-lbl { font-size:11px; font-weight:500; color:var(--t2); margin-bottom:8px; }
.legend { display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--t2); margin-bottom:10px; }
.legend span { display:flex; align-items:center; gap:4px; }
.ldot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.lline { width:14px; height:2px; border-radius:1px; flex-shrink:0; }
.ptabs { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
.ptab { padding:3px 11px; border-radius:20px; border:1px solid var(--border2); font-size:11px; color:var(--t2); cursor:pointer; background:transparent; transition:all .14s; }
.ptab:hover { border-color:var(--accent); color:var(--accent); }
.ptab.active { background:rgba(0,184,93,.15); border-color:var(--accent); color:var(--accent); font-weight:500; }
.chart-wrap { position:relative; width:100%; }
.evt-tooltip { position: fixed; z-index: 9999; background: #1c2128; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 13px; pointer-events: none; max-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none; }
.evt-tooltip-week { font-size:10px; color:#556070; margin-bottom:6px; font-weight:500; letter-spacing:.04em; }
.evt-tooltip-title { font-size:11px; font-weight:600; color:#e6edf3; margin-bottom:6px; }
.evt-tooltip-item { font-size:11px; color:#8b949e; line-height:1.6; padding-left:10px; position:relative; }
.evt-tooltip-item::before { content:"·"; position:absolute; left:0; color:#5DCAA5; }
.evt-tooltip-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#00B85D; margin-right:4px; vertical-align:middle; }
</style>
</head>

      </div>
      <div class="chart-wrap" style="height:200px"><canvas id="c2b"></canvas></div>
    </div>
  </div>
</main>
<div class="evt-tooltip" id="evtTip">

</div>

function axisStyle(label) {
  return {
    title:{ display:!!label, text:label, font:{size:10}, color:TC },
    ticks:{ font:{size:9}, color:TC },
    grid:{ color:GC }
  };
}

function makeEvtPlugin(evtArr) {
  return {
    id: 'evtDots',
    afterDraw(chart) {
      const arr = chart.evtArr !== undefined ? chart.evtArr : evtArr;
      if (!arr) return;
      const ctx = chart.ctx;
      const xScale = chart.scales.x;
      if (!xScale) return;
      for (let i = 0; i < D.weeks.length; i++) {
        if (hasEvt(arr, i)) {
          const px = xScale.getPixelForValue(i);
          const py = xScale.top + xScale.height + 2;
          ctx.save();
          ctx.beginPath();
          ctx.arc(px, py, 3, 0, Math.PI * 2);
          ctx.fillStyle = '#00B85D';
          ctx.fill();
          ctx.restore();
        }
      }
    }
  };
}

function updateS2Summary(d) {
  var el = document.getElementById('s2-metrics');
  if (!el) return;
  // 현재 채널 배지 표시
  var chLabel = (typeof S2 !== 'undefined') ? CH_NAMES[S2.ch] : '보험상품탭';
  var chColor = (typeof S2 !== 'undefined') ? CH_COLORS[S2.ch] : '#1D9E75';
  var headerEl = document.getElementById('s2-ch-badge');
  if (headerEl) {
    headerEl.textContent = chLabel;
    headerEl.style.background = chColor + '20';
    headerEl.style.color = chColor;
    headerEl.style.borderColor = chColor + '50';
  }
  var CUR = 23;
  var PREV = [19,20,21,22];
  function avg4(arr) { return PREV.reduce(function(s,i){ return s+arr[i]; },0)/4; }
  function rnd(v) { return Math.round(v); }
  var designCur  = rnd(d.landing[CUR] * d.dr[CUR] / 100);
  var applyCur   = rnd(d.landing[CUR] * d.dr[CUR] / 100 * d.ar[CUR] / 100);
  var contractCur = rnd(d.contract[CUR]);
  var designAvg  = rnd(avg4(d.landing) * avg4(d.dr) / 100);
  var applyAvg   = rnd(avg4(d.landing) * avg4(d.dr) / 100 * avg4(d.ar) / 100);
  var contractAvg = Math.round(avg4(d.contract)*10)/10;
  var landingCur = rnd(d.landing[CUR]);
  var landingAvg = rnd(avg4(d.landing));
  var tabVisitorCur  = D.insuranceTab[CUR] > 0 ? D.insuranceTab[CUR] : 1;
  var tabVisitorAvg4 = PREV.reduce(function(s,i){ return s+D.insuranceTab[i]; },0)/4;
  var productRateCur = (d.landing[CUR] / tabVisitorCur * 100).toFixed(2);
  var productRateAvg = (avg4(d.landing) / tabVisitorAvg4 * 100).toFixed(2);
  var productRateDiff = parseFloat(productRateCur) - parseFloat(productRateAvg);
  var metrics = [
    { lbl:'상품 진입율',  cnt:landingCur,   cUnit:'명', rate:productRateCur,            avgCnt:landingAvg,    avgRate:productRateAvg,            diff:productRateDiff },
    { lbl:'설계 진입율',  cnt:designCur,    cUnit:'명', rate:d.dr[CUR].toFixed(2),     avgCnt:designAvg,     avgRate:avg4(d.dr).toFixed(2),     diff:d.dr[CUR]-avg4(d.dr) },
    { lbl:'청약 진입율',  cnt:applyCur,     cUnit:'명', rate:d.ar[CUR].toFixed(2),     avgCnt:applyAvg,      avgRate:avg4(d.ar).toFixed(2),     diff:d.ar[CUR]-avg4(d.ar) },
    { lbl:'청약 완료율',  cnt:contractCur,  cUnit:'건', rate:d.cr[CUR].toFixed(2),     avgCnt:contractAvg,   avgRate:avg4(d.cr).toFixed(2),     diff:d.cr[CUR]-avg4(d.cr) },
    { lbl:'청약전환율',   cnt:contractCur,  cUnit:'건', rate:d.overall[CUR].toFixed(4),avgCnt:contractAvg,   avgRate:avg4(d.overall).toFixed(4),diff:d.overall[CUR]-avg4(d.overall) },
  ];
  el.innerHTML = metrics.map(function(m) {
    var isUp = m.diff >  0.005;
    var isDn = m.diff < -0.005;
    var cl = isUp ? '#5DCAA5' : isDn ? '#F0997B' : '#8b949e';
    var bg = isUp ? 'rgba(29,158,117,0.12)' : isDn ? 'rgba(216,90,48,0.12)' : 'rgba(128,128,128,0.08)';
    var sign = isUp ? '+' : isDn ? '' : '±';
    var diffStr = sign + Math.abs(m.diff).toFixed(2) + '%p';
    return '<div style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;border-radius:8px;background:'+bg+';border:1px solid '+cl+'33;">'
      + '<span style="font-size:9px;color:#8b949e;white-space:nowrap;">'+m.lbl+'</span>'
      + '<span style="font-size:14px;font-weight:600;color:'+cl+';">'+m.cnt.toLocaleString()+m.cUnit
        +'<span style="font-size:11px;font-weight:400;color:'+cl+';margin-left:3px;">('+m.rate+'%)</span></span>'
      + '<span style="font-size:9px;color:#8b949e;">4주평균 '+m.avgCnt+m.cUnit+'('+m.avgRate+'%)'
        +' <span style="color:'+cl+';">'+diffStr+'</span></span>'
      + '</div>';
  }).join('');
}

  tipWeek.textContent = D.weeks[weekIdx] + ' 주차';
  tipTitle.innerHTML = '<span class="evt-tooltip-dot"></span>' + titleLabel + ' 적용 이벤트';
  tipBody.innerHTML = evtList.map(t => `<div class="evt-tooltip-item">${t}</div>`).join('');
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  if (!tip) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  const tw = tip.offsetWidth + 16, th = tip.offsetHeight + 16;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > vw) x = e.clientX - tw + 2;
  if (y + th > vh) y = e.clientY - th + 2;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip() { if (tip) tip.style.display = 'none'; }

function attachEvtHover(canvasId, evtArr, titleLabel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  canvas.addEventListener('mousemove', function(e) {
    const chart = Chart.getChart(canvas);
    if (!chart) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const xScale = chart.scales.x;
    if (!xScale) return;
    let closestIdx = -1, minDist = Infinity;
    for (let i = 0; i < D.weeks.length; i++) {
      const px = xScale.getPixelForValue(i);
      const dist = Math.abs(x - px);
      if (dist < minDist) { minDist = dist; closestIdx = i; }
    }
    if (closestIdx >= 0 && minDist < 40 && hasEvt(evtArr, closestIdx)) {
      showTip(e, closestIdx, evtArr[closestIdx], titleLabel);
    } else { hideTip(); }
  });
  canvas.addEventListener('mouseleave', hideTip);
  document.addEventListener('mousemove', function(e) { if (tip && tip.style.display === 'block') moveTip(e); });
}

const prodEvtMap = ['whole', 'jeonggi', 'cancer', 'jonghap'];

renderSummary();
updateS2Summary(D.tab.whole);
attachEvtHover('c1b', EVT.tab, '보험상품탭');
