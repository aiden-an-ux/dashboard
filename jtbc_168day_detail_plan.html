const PHASE_LABELS = {rec:'회복',base:'베이스',build:'빌드업',peak:'피크',taper:'테이퍼',race:'레이스위크'};
const PHASE_COLORS = {rec:'pb-rec',base:'pb-base',build:'pb-build',peak:'pb-peak',taper:'pb-taper',race:'pb-race'};
let currentPhase = 'all';
let openWeeks = new Set();

function typeClass(t){
  return 'tb-'+t;
}
function typeLabel(t){
  const m={rest:'휴식',easy:'이지런',lsd:'LSD',tempo:'템포',interval:'인터벌',mp:'MP런',race:'레이스',recovery:'회복조깅'};
  return m[t]||t;
}

function renderWeeks(){
  const c = document.getElementById('weekContainer');
  const filtered = currentPhase==='all' ? PLAN : PLAN.filter(w=>w.phase===currentPhase);
  let html = '';
  filtered.forEach(w=>{
    const isOpen = openWeeks.has(w.w);
    const restDays = w.days.filter(d=>d.type==='rest').length;
    const runDays = 7 - restDays;
    html += `<div class="week-block" data-phase="${w.phase}">
      <div class="phase-banner ${PHASE_COLORS[w.phase]}">${PHASE_LABELS[w.phase]}</div>
      <div class="week-hd" onclick="toggleWeek(${w.w})">
        <div><div class="wk-num">W${w.w} · ${w.dates}</div><div class="wk-dates">${w.label}</div></div>
        <div></div>
        <div class="wk-km">${w.km}km</div>
        <div class="wk-chevron">${isOpen?'▲':'▼'}</div>
      </div>
      <div class="day-rows ${isOpen?'open':''}">`;
    w.days.forEach(d=>{
      const isRest = d.type==='rest';
      html += `<div class="day-row ${isRest?'rest-row':''}">
        <div><div class="d-dow">${d.dow}</div><div class="d-date">${d.date}</div></div>
        <div style="padding-top:1px"><span class="type-badge ${typeClass(d.type)}">${typeLabel(d.type)}</span></div>
        <div class="d-main">${d.main}${d.note?`<div class="d-note">${d.note}</div>`:''}</div>
        <div class="d-metric"><strong>${d.km}</strong>${d.hr!=='—'?d.hr:'—'}</div>
      </div>`;
    });
    const wkTotal = w.days.filter(d=>d.km!=='—').length;
    html += `<div class="summary-bar"><span>훈련일 <span class="sb-val">${runDays}일</span></span><span>주간 총거리 <span class="sb-val">${w.km}km</span></span></div>`;
    html += `</div></div>`;
  });
  c.innerHTML = html;
}

function toggleWeek(n){
  if(openWeeks.has(n)) openWeeks.delete(n);
  else openWeeks.add(n);
  renderWeeks();
}

function filterPhase(p){
  currentPhase = p;
  openWeeks.clear();
  document.querySelectorAll('.pnav').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderWeeks();
}

renderWeeks();
</script>
